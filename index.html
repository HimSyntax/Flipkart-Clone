<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flipkart Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">Flipkart</div>

  <div class="search">
    <input type="text" placeholder="Search for products, brands and more">
  </div>

  <div class="nav-items">
    <button class="login-btn">Login</button>
    <span>Cart 🛒</span>
    <span>Become a Seller</span>
  </div>
</header>

<!-- CATEGORY BAR -->
<section class="categories">
  <div>Mobiles</div>
  <div>Fashion</div>
  <div>Electronics</div>
  <div>Home</div>
  <div>Appliances</div>
  <div>Travel</div>
</section>

<!-- HERO BANNER -->
<section class="hero">
  <img src="https://flipshope.com/blog/wp-content/uploads/2024/01/Flipkart-republic-day-sale.jpg" alt="">
</section>

<!-- PRODUCTS -->
<section class="products">

  <div class="card">
    <img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-14-3.jpg" alt="">
    <h4>iPhone 14</h4>
    <p class="price">₹69,999</p>
  </div>

  <div class="card">
    <img src="https://t4.ftcdn.net/jpg/03/91/45/63/360_F_391456310_iYbpTyVcCgjhbcnCBn3Nb2veidPKyEfX.jpg" alt="">
    <h4>Nike Shoes</h4>
    <p class="price">₹2,499</p>
  </div>

  <div class="card">
    <img src="https://in-media.apjonlinecdn.com/catalog/product/cache/314dec89b3219941707ad62ccc90e585/c/0/c08403046_1_1_3.png" alt="">
    <h4>HP Laptop</h4>
    <p class="price">₹54,999</p>
  </div>

  <div class="card">
    <img src="https://temptindia.com/cdn/shop/files/Artboard1.png?v=1704273967" alt="">
    <h4>Smart Watch</h4>
    <p class="price">₹1,999</p>
  </div>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Flipkart Clone | Built by You 🚀</p>
</footer>

</body>
</html>
